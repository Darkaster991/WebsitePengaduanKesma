<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIPEMA - Adkesma HMTK USK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --navy: #0f172a;
            --gold: #b45309;
        }
        .bg-navy { background-color: var(--navy); }
        .text-gold { color: var(--gold); }
        .border-gold { border-color: var(--gold); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

    <!-- Header -->
    <header class="bg-navy text-white py-6 shadow-lg border-b-4 border-gold">
        <div class="container mx-auto px-4 flex flex-col items-center text-center">
            <div class="w-20 h-20 bg-gray-200 rounded-full mb-3 flex items-center justify-center text-navy font-bold text-xs">LOGO</div>
            <h1 class="text-2xl md:text-3xl font-bold tracking-wide">HIMPUNAN MAHASISWA TEKNIK KOMPUTER</h1>
            <p class="text-gold font-medium">Sistem Pengaduan Mahasiswa (SIPEMA) - Bidang Adkesma</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-10">
        <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-md overflow-hidden border border-gray-200">
            <div class="p-8">
                <h2 class="text-xl font-semibold text-navy mb-6 border-b pb-2">Formulir Pengaduan Formal</h2>
                
                <form id="complaintForm" class="space-y-5">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Nama Lengkap</label>
                            <input type="text" name="nama" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-navy outline-none transition">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">NPM</label>
                            <input type="number" name="npm" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-navy outline-none transition">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Angkatan</label>
                            <input type="text" name="angkatan" placeholder="Contoh: 2023" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-navy outline-none transition">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Kategori</label>
                            <select name="kategori" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-navy outline-none transition">
                                <option value="Akademik">Akademik</option>
                                <option value="Fasilitas">Fasilitas</option>
                                <option value="Beasiswa">Beasiswa</option>
                                <option value="Lainnya">Lainnya</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Detail Pengaduan</label>
                        <textarea name="detail" rows="5" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-navy outline-none transition" placeholder="Jelaskan masalah Anda secara rinci..."></textarea>
                    </div>

                    <button type="submit" id="submitBtn" class="w-full bg-navy hover:bg-slate-800 text-white font-bold py-3 px-6 rounded-lg transition duration-300 transform hover:scale-[1.01] flex items-center justify-center">
                        <span id="btnText">Kirim Laporan Resmi</span>
                        <div id="loader" class="hidden ml-3 w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                    </button>
                </form>

                <!-- Success Message -->
                <div id="successMsg" class="hidden mt-6 p-4 bg-green-100 border-l-4 border-green-500 text-green-700">
                    <p class="font-bold">Laporan Terkirim!</p>
                    <p class="text-sm">Terima kasih. Laporan Anda telah diproses menjadi dokumen formal dan disimpan di database Adkesma.</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center py-10 text-gray-500 text-sm">
        &copy; 2024 Adkesma HMTK Universitas Syiah Kuala
    </footer>

    <script>
        const scriptURL = 'URL_GOOGLE_APPS_SCRIPT_ANDA'; // Ganti dengan URL Web App Anda
        const form = document.getElementById('complaintForm');
        const btn = document.getElementById('submitBtn');
        const loader = document.getElementById('loader');
        const btnText = document.getElementById('btnText');
        const successMsg = document.getElementById('successMsg');

        form.addEventListener('submit', e => {
            e.preventDefault();
            btn.disabled = true;
            loader.classList.remove('hidden');
            btnText.innerText = "Sedang Memproses...";

            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            fetch(scriptURL, { 
                method: 'POST', 
                mode: 'no-cors', // Penting untuk menghindari CORS issue pada GAS
                body: JSON.stringify(data),
                headers: { 'Content-Type': 'application/json' }
            })
            .then(() => {
                form.reset();
                btn.classList.add('hidden');
                successMsg.classList.remove('hidden');
            })
            .catch(error => {
                console.error('Error!', error.message);
                alert('Terjadi kesalahan saat mengirim laporan.');
                btn.disabled = false;
                loader.classList.add('hidden');
                btnText.innerText = "Kirim Laporan Resmi";
            });
        });
    </script>
</body>
</html>
